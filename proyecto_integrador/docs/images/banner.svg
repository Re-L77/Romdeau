<svg width="1600" height="420" viewBox="0 0 1600 420" fill="none" xmlns="http://www.w3.org/2000/svg"
    role="img" aria-labelledby="title desc">
    <title id="title">Romdeau Banner</title>
    <desc id="desc">Banner oscuro y minimalista para Romdeau con titulo y tarjeta resumen.</desc>

    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="420" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#050816" />
            <stop offset="1" stop-color="#0B1220" />
        </linearGradient>
        <linearGradient id="ink" x1="120" y1="74" x2="820" y2="330" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#F8FAFC" />
            <stop offset="1" stop-color="#D9E2F2" />
        </linearGradient>
        <linearGradient id="line" x1="930" y1="120" x2="1440" y2="300"
