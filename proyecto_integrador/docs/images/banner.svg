            <stop offset="0" stop-color="#2F7D6D" />
            <stop offset="0.5" stop-color="#1F516F" />
            <stop offset="1" stop-color="#D69B2D" />
        </linearGradient>
        <filter id="softShadow" x="0" y="0" width="1600" height="420" filterUnits="userSpaceOnUse"
            color-interpolation-filters="sRGB">
            <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#000000"
                flood-opacity="0.30" />
        </filter>
    </defs>

    <rect width="1600" height="420" rx="32" fill="url(#bg)" />
    <rect x="24" y="24" width="1552" height="372" rx="28" fill="none"
        stroke="rgba(255,255,255,0.06)" />

