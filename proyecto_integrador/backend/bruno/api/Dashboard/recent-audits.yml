info:
  name: Recent Audits Dashboard
  type: http
  seq: 3

http:
  method: GET
  url: '{{baseUrl}}/api/dashboard/auditorias-recientes'
  headers:
    - name: Authorization
      value: 'Bearer {{token}}'
    - name: Content-Type
      value: application/json
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
