info:
  name: Change User Password (Admin)
  type: http
  seq: 7

http:
  method: PATCH
  url: '{{baseUrl}}/api/usuarios/1/password'
  headers:
    - name: Authorization
      value: 'Bearer {{token}}'
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "password": "NewPassword123!"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
