info:
  name: Create Asset
  type: http
  seq: 5

http:
  method: POST
  url: '{{baseUrl}}/api/activos'
  headers:
    - name: Authorization
      value: 'Bearer {{token}}'
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "codigo_etiqueta": "ASSET-001",
        "nombre": "Laptop Dell",
        "categoria_id": 1,
        "estado_operativo_id": 1,
        "proveedor_id": 1,
        "custodio_id": 1,
        "oficina_id": 1
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
