info:
  name: Get All Departments
  type: http
  seq: 1

http:
  method: GET
  url: '{{baseUrl}}/api/departamentos'
  headers:
    - name: Authorization
      value: 'Bearer {{token}}'
    - name: Content-Type
      value: application/json
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
