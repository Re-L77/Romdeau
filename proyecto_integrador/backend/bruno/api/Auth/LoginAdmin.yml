info:
  name: LoginAdmin
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/api/auth/login"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "email": "124051537@upq.edu.mx",
        "password": "{{testPassword}}"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.status === 200) {
          bru.setEnvVar('token', res.body.access_token);
          bru.setEnvVar('refresh_token', res.body.refresh_token);
          console.log('Login exitoso');
          console.log('Access Token:', res.body.access_token.substring(0, 20) + '...');
          console.log('Refresh Token:', res.body.refresh_token.substring(0, 20) + '...');
        } else {
          console.log('Login fallido:', res.status, res.body);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
