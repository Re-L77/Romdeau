info:
  name: Change Password
  type: http
  seq: 7

http:
  method: PUT
  url: "{{baseUrl}}/api/auth/change-password"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "newPassword": "{{testPassword}}"
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
