info:
  name: Refresh Token
  type: http
  seq: 2

http:
  method: POST
  url: '{{baseUrl}}/api/auth/refresh-token'
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "refresh_token": "{{refresh_token}}"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.status === 200) {
          bru.setEnvVar('token', res.body.access_token);
          bru.setEnvVar('refresh_token', res.body.refresh_token);
          console.log('Token refrescado:', res.body.access_token);
        } else {
          console.log('Error refrescando token:', res.status, res.body);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
