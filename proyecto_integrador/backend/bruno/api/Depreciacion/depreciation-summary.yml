info:
  name: Depreciation Summary
  type: http
  seq: 1

http:
  method: GET
  url: '{{baseUrl}}/api/depreciacion/summary'
  headers:
    - name: Authorization
      value: 'Bearer {{token}}'
    - name: Content-Type
      value: application/json
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
